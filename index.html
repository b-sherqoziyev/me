<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahromjon | Full-Stack Developer Portfolio</title>
    <meta name="description" content="Bahromjon - Professional Full-stack dasturchi va UI/UX dizayner. Mening eng so'nggi loyihalarim va maqolalarim bilan tanishing.">
    <!-- Shriftlar va Ikonkalar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigatsiya paneli -->
    <header class="navbar" id="navbar">
        <div class="container">
            <a href="#" class="logo-circle">B</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="#home">Asosiy</a></li>
                    <li><a href="#about">Haqimda</a></li>
                    <li><a href="#blog">Blog</a></li>
                    <li><a href="#contact">Bog'lanish</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="home" class="hero">
            <div class="container">
                <span class="badge" id="hero-badge"></span>
                <h1>Salom, Men <span class="typing"></span></h1>
                <p id="hero-p"></p>
                <div class="cta-buttons">
                    <a href="#contact" class="btn primary">Bog'lanish</a>
                    <a href="#blog" class="btn secondary">Maqolalarim</a>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about section">
            <div class="container">
                <h2 class="section-title">Tajriba va Texnologiyalar</h2>
                <div class="about-content">
                    <p id="about-bio"></p>
                    <div class="skills-mini" id="skills-list">
                        <!-- Skills will be injected here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Blog Section -->
        <section id="blog" class="blog section">
            <div class="container">
                <h2 class="section-title">Oxirgi maqolalar</h2>
                <div class="blog-list" id="blog-list">
                    <!-- Blog posts will be injected here -->
                </div>
            </div>
        </section>


        <!-- Contact Section -->
        <section id="contact" class="contact section">
            <div class="container">
                <h2 class="section-title">Bog'lanish</h2>
                
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" placeholder="Ismingiz" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Emailingiz" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Xabaringizni bu yerga qoldiring..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn primary">Xabar yuborish</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-simple">
                <div class="socials" id="footer-socials">
                    <!-- Socials will be injected here -->
                </div>
                <div class="footer-contacts-simple" id="footer-contacts">
                    <!-- Email and Phone will be injected here -->
                </div>
            </div>
            <div class="footer-bottom">
                <p id="copyright-text"></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
